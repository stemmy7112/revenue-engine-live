services:
  - type: web
    name: revenue-engine
    env: node
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npm run start
    envVars:
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: STRIPE_PRICE_ONE_TIME
        sync: false
      - key: STRIPE_PRICE_SUB
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: APP_BASE_URL
        sync: false
      - key: VITE_API_BASE_URL
        sync: false
      - key: PORT
        value: "10000"
